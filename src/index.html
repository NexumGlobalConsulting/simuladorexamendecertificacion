<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Examen OECE - NEXUM</title>
    <style>
        :root {
            --primary: #004a99;
            --secondary: #6c757d;
            --success: #28a745;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; padding: 2rem 0; border-bottom: 3px solid var(--primary); margin-bottom: 30px; }
        .question-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; transition: transform 0.2s; }
        .question-card:hover { transform: translateY(-2px); }
        .meta-info { font-size: 0.85rem; color: var(--secondary); margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        h3 { margin-top: 10px; color: #1a1a1a; }
        .options-grid { display: grid; gap: 12px; margin-top: 20px; }
        .option-label { 
            display: flex; align-items: center; padding: 15px; background: #fff; border: 2px solid #e9ecef; 
            border-radius: 8px; cursor: pointer; transition: all 0.2s; 
        }
        .option-label:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.2); }
        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 18px 30px; 
            font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; 
            width: 100%; margin: 30px 0; display: none; 
        }
        .btn-submit:hover { background: #003366; }
        #results { 
            display: none; background: white; padding: 30px; border-radius: 12px; 
            border-left: 8px solid var(--success); margin-top: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        .score-box { font-size: 2rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div id="timer" style="font-weight:bold; margin-bottom:10px;">
    Tiempo restante: 120:00
    </div>

<div id="finish-modal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    width:320px;
    text-align:center;
  ">
    
    <h3>Finalizar examen</h3>
    
    <p id="unanswered-info"></p>

    <div style="margin-top:15px;">
      <button onclick="closeFinishModal()">Volver</button>
      <button onclick="confirmSubmit()">Confirmar envío</button>
    </div>

  </div>
</div>

<div id="timeout-modal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    width:320px;
    text-align:center;
  ">
    <h3>Tiempo finalizado</h3>
    <p>El examen se enviará automáticamente</p>
  </div>
</div>

    <div class="container">
        <div class="header">
            <h1>Simulador Examen OECE</h1>
            <p>NEXUM Global Consulting - Especialistas en Gestión Pública</p>
        </div>

        <div id="quiz-container">
            <p style="text-align: center;">Iniciando Engine Central...</p>
        </div>
        <div id="results" style="display:none; margin-top:20px;"></div>
        <button id="finish-btn" onclick="openFinishModal()" style="margin-top:20px;">
  Finalizar examen
        </button>
        
        <button id="submit-btn" class="btn-submit" onclick="openFinishModal()">Finalizar y Evaluar Examen</button>

    </div>

    <script>
let questionData = [];
let currentIndex = 0;
let answers = [];
let totalTime = 15 // debe ser 120 minutos en segundos
let timerInterval;
let examFinished = false;

function openTimeUpModal() {

    document.getElementById("timeout-modal").style.display = "flex";

    setTimeout(() => {
        submitExam().finally(() => {
            document.getElementById("timeout-modal").style.display = "none";
        });
    }, 2000);
} // 👈 ESTA LLAVE FALTABA

function generarStatsSubcompetencia() {

    const stats = {};

    questionData.forEach((q, i) => {

        const key = `C${q.competencia}.${q.subcompetencia} - ${q.tema}`;

        if (!stats[key]) {
            stats[key] = { total: 0, correctas: 0 };
        }

        stats[key].total++;

        if (answers[i] === q.respuesta_correcta) {
            stats[key].correctas++;
        }
    });

    return stats;
}

function diagnosticoGeneral(stats) {

    const total = Object.values(stats).reduce((acc, s) => acc + s.total, 0);
    const correctas = Object.values(stats).reduce((acc, s) => acc + s.correctas, 0);

    const porcentaje = (correctas / total) * 100;

    if (porcentaje >= 70) return "🟢 Dominio adecuado";
    if (porcentaje >= 50) return "🟡 Nivel en desarrollo";
    return "🔴 Nivel bajo, requiere refuerzo";
}

function diagnosticoPorSub(stats) {

    return Object.entries(stats).map(([key, s]) => {

        const p = (s.correctas / s.total) * 100;

        let nivel = "🔴 Bajo";
        if (p >= 70) nivel = "🟢 Alto";
        else if (p >= 50) nivel = "🟡 Medio";

        return `<p>${key}: ${Math.round(p)}% — ${nivel}</p>`;
    }).join('');
}

function recomendacionPorSub(stats) {

    return Object.entries(stats)
        .filter(([_, s]) => (s.correctas / s.total) < 0.5)
        .map(([key]) => `<li>${key}</li>`)
        .join('');
}

function generarAnalisis() {

    const stats = {};

    questionData.forEach((q, i) => {
        const tema = `C${q.competencia} - ${q.tema}`;

        if (!stats[tema]) {
            stats[tema] = {
                total: 0,
                correctas: 0
            };
        }

        stats[tema].total++;

        if (answers[i] === q.respuesta_correcta) {
            stats[tema].correctas++;
        }
    });

    return stats;
}

function renderAnalisis(stats) {

    return Object.entries(stats).map(([tema, data]) => {

        const porcentaje = Math.round((data.correctas / data.total) * 100);

        let nivel = "🔴 Bajo";
        if (porcentaje >= 70) nivel = "🟢 Alto";
        else if (porcentaje >= 50) nivel = "🟡 Medio";

        return `
            <div style="margin-top:10px;">
                <strong>${tema}</strong><br>
                ${data.correctas}/${data.total} correctas (${porcentaje}%) — ${nivel}
            </div>
        `;
    }).join('');
}

function generarRecomendacion(stats) {

    const debiles = [];
    const medias = [];

    Object.entries(stats).forEach(([tema, data]) => {
        const porcentaje = (data.correctas / data.total) * 100;

        if (porcentaje < 50) debiles.push(tema);
        else if (porcentaje < 70) medias.push(tema);
    });

    let mensaje = "";

    if (debiles.length > 0) {
        mensaje += `🔴 Debes reforzar: ${debiles.join(", ")}.<br>`;
    }

    if (medias.length > 0) {
        mensaje += `🟡 Puedes mejorar en: ${medias.join(", ")}.`;
    }

    if (mensaje === "") {
        mensaje = "🟢 Buen desempeño general. Puedes avanzar a nivel superior.";
    }

    return mensaje;
}
    // ===============================
// 🧠 CONTROL DE FINALIZACIÓN
// ===============================

function openFinishModal() {
    const unanswered = answers.filter(a => a === null).length;

    document.getElementById("unanswered-info").innerText =
        `Tienes ${unanswered} preguntas sin responder`;

    document.getElementById("finish-modal").style.display = "flex";
}

function closeFinishModal() {
    document.getElementById("finish-modal").style.display = "none";
}

function confirmSubmit() {
    closeFinishModal();
    submitExam(); // ✅ envío directo
}

// ===============================
// 🚀 CARGA INICIAL
// ===============================
async function loadQuestions() {
    try {
        const response = await fetch('/api/questions');
        if (!response.ok) throw new Error('Error en API');

        questionData = await response.json();
        answers = new Array(questionData.length).fill(null);

        renderQuestion();
        renderNavigation();

        document.getElementById('submit-btn').style.display = 'none';

        startTimer(); // 👈 ESTA ES LA CLAVE

    } catch (error) {
        document.getElementById('quiz-container').innerHTML =
            `<p style="color:red; text-align:center;">Error al cargar preguntas</p>`;
    }
}

// ===============================
// 🧠 RENDER PREGUNTA (UNA SOLA)
// ===============================
function renderQuestion() {
    
    const q = questionData[currentIndex];
    const container = document.getElementById('quiz-container');

    container.innerHTML = `
        <div class="question-card">

            <span class="meta-info">
                Pregunta ${currentIndex + 1} de ${questionData.length} |
                Tema: ${q.tema} | Nivel: ${q.nivel} | Peso: ${q.peso}
            </span>

            <h3>${q.enunciado}</h3>

            <div class="options-grid">
                ${Object.entries(q.opciones).map(([key, val]) => `
    <label style="
        display:block;
        padding:10px;
        margin:5px 0;
        border:1px solid #ddd;
        border-radius:8px;
        ${examFinished ? 'cursor:default;' : 'cursor:pointer;'}

        ${examFinished && key === q.respuesta_correcta ? 'background:#d4edda;' : ''}
        ${examFinished && answers[currentIndex] === key && key !== q.respuesta_correcta ? 'background:#f8d7da;' : ''}
    ">
        <input type="radio"
            name="question"
            value="${key}"
            ${answers[currentIndex] === key ? 'checked' : ''}
            ${examFinished ? 'disabled' : ''}
            ${!examFinished ? `onchange="saveAnswer('${key}')"` : ''}
        >
        <strong>${key})</strong> ${val}
    </label>
`).join('')}

            </div>

            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button onclick="prevQuestion()" ${currentIndex === 0 ? "disabled" : ""}>
                    ← Anterior
                </button>

                <button onclick="nextQuestion()" ${currentIndex === questionData.length - 1 ? "disabled" : ""}>
                    Siguiente →
                </button>
            </div>

        </div>
    `;
}

// ===============================
// 💾 GUARDAR RESPUESTA
// ===============================
function saveAnswer(value) {

    if (examFinished) return; // 🔴 BLOQUEO REAL

    answers[currentIndex] = value;
    renderNavigation();
}

// ===============================
// 🔁 NAVEGACIÓN
// ===============================
function nextQuestion() {
    if (currentIndex < questionData.length - 1) {
        currentIndex++;
        renderQuestion();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
}

// ===============================
// 🔢 PANEL DE NAVEGACIÓN (TIPO OECE)
// ===============================
function renderNavigation() {
    let nav = document.getElementById('question-nav');

    if (!nav) {
        nav = document.createElement('div');
        nav.id = 'question-nav';
        nav.style.margin = '20px 0';
        nav.style.display = 'grid';
        nav.style.gridTemplateColumns = 'repeat(10, 1fr)';
        nav.style.gap = '6px';
        document.querySelector('.container').insertBefore(nav, document.getElementById('quiz-container'));
    }

    nav.innerHTML = questionData.map((_, i) => {
        let bg = "#e9ecef"; // no respondida

        if (answers[i]) bg = "#007bff"; // respondida
        if (i === currentIndex) bg = "#ffc107"; // actual

        return `
            <div onclick="goToQuestion(${i})"
                 style="
                    padding:8px;
                    text-align:center;
                    cursor:pointer;
                    border-radius:6px;
                    background:${bg};
                    color:white;
                    font-weight:bold;">
                ${i + 1}
            </div>
        `;
    }).join('');
}

function goToQuestion(index) {
    currentIndex = index;
    renderQuestion();
}

// ===============================
// 📤 ENVÍO (SIN CAMBIOS BACKEND)
// ===============================
async function submitExam() {

    if (examFinished) return;

    try {
        const response = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers })
        });

        if (!response.ok) throw new Error("Error servidor");

        const result = await response.json();

        // 🔴 CERRAR MODAL
        document.getElementById("timeout-modal").style.display = "none";

        displayResults(result);

    } catch (error) {
        console.error(error);
        alert("Error al enviar examen");
    }
}


function obtenerErrores() {
    return questionData.map((q, i) => {
        return {
            tema: q.tema,
            enunciado: q.enunciado,
            respuesta_correcta: q.respuesta_correcta,
            explicacion: q.explicacion,
            sustento_normativo: q.sustento_normativo, // 👈 CLAVE
            respuesta_usuario: answers[i],
            es_correcta: answers[i] === q.respuesta_correcta
        };
    }).filter(q => !q.es_correcta);
}

function renderFeedback(errores) {

    if (errores.length === 0) {
        return "<p>🎉 Excelente, no tienes errores.</p>";
    }

    return errores.map(q => `
        <div style="margin-top:15px; padding:10px; border:1px solid #ddd; border-radius:8px;">
            <strong>${q.tema}</strong><br>
            ${q.enunciado}<br><br>

            ❌ Tu respuesta: ${q.respuesta_usuario || "No respondida"}<br>
            ✅ Correcta: ${q.respuesta_correcta}<br>

            <em>${q.explicacion || "Sin explicación disponible"}</em>
            
            📚 Sustento: ${q.sustento_normativo || "No disponible"}

        </div>
    `).join('');
}

function generarReporteHTML() {

    const statsSub = generarStatsSubcompetencia();
    const statsTema = generarAnalisis();

    const html = `
        <h1>Reporte NEXUM</h1>

        <h2>Diagnóstico general</h2>
        <p>${diagnosticoGeneral(statsSub)}</p>

        <h2>Diagnóstico por subcompetencia</h2>
        ${diagnosticoPorSub(statsSub)}

        <h2>Recomendación</h2>
        <p>${generarRecomendacion(statsSub)}</p>

        <h2>Detalle por temas</h2>
        ${Object.entries(statsTema).map(([t, s]) => {
            const p = Math.round((s.correctas / s.total) * 100);
            return `<p>${t}: ${p}%</p>`;
        }).join('')}
    `;

    const w = window.open();
    w.document.write(html);
    w.document.close();
}

// ===============================
// 📊 RESULTADOS (SIN CAMBIOS)
// ===============================
function displayResults(result) {
    
    examFinished = true;
    renderQuestion();
    
    const resultDiv = document.getElementById('results');
    // modo revisión → no ocultar preguntas
    const statsSub = generarStatsSubcompetencia();
    const diagGeneral = diagnosticoGeneral(statsSub);
    const diagSub = diagnosticoPorSub(statsSub);
    const recSub = recomendacionPorSub(statsSub);

    resultDiv.innerHTML = `
        <h2>Resultados</h2>

        <h3>${result.score_obtenido} / ${result.score_maximo}</h3>

        <h3>Diagnóstico general</h3>
        <p>${diagGeneral}</p>

        <p style="margin-top:15px; font-size:12px; color:gray;">
        Resultado referencial con fines de autoevaluación. No constituye certificación oficial ni reemplaza los procesos del OECE.
        </p>

        <h3>Diagnóstico por subcompetencia</h3>
        ${diagSub}

        <h3>Recomendación general</h3>
        <p>${generarRecomendacion(statsSub)}</p>

        <h3>Recomendación por subcompetencia</h3>
        <ul>${recSub}</ul>

        <button onclick="generarReporteHTML()">📄 Generar reporte</button>
    `;

    // 👇 ESTA LÍNEA ES LA CLAVE
    resultDiv.style.display = "block";
}

function startTimer() {
    timerInterval = setInterval(() => {

        const minutes = Math.floor(totalTime / 60);
        const seconds = totalTime % 60;

        document.getElementById("timer").innerText =
            `Tiempo restante: ${minutes}:${seconds.toString().padStart(2,'0')}`;

        totalTime--;

        if (totalTime < 0) {
            clearInterval(timerInterval);
            openTimeUpModal();
        }

    }, 1000);
}

// ===============================
window.onload = loadQuestions;
</script>
</body>
</html>
